<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Liste interminable"/>
  <title>Liste interminable</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css"/>
  <style>
    :root {
      --bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;
      --text:#111111;--text2:#555555;--text3:#999999;
      --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);--border3:rgba(0,0,0,0.3);
      --info-bg:#EFF6FF;--info-co:#1D4ED8;
      --ok-bg:#F0FDF4;--ok-co:#16A34A;--ok-border:#16A34A;
      --warn-bg:#FFFBEB;--warn-co:#D97706;
      --danger-bg:#FFF1F2;--danger-co:#E11D48;
      --muted-bg:#F5F5F5;--muted-co:#555555;
      --new-bg:#F0F0FF;--new-co:#4F46E5;
      --radius:10px;
    }
    @media(prefers-color-scheme:dark){
      :root{
        --bg:#111111;--bg2:#1c1c1c;--bg3:#272727;
        --text:#f0f0f0;--text2:#aaaaaa;--text3:#666666;
        --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--border3:rgba(255,255,255,0.3);
        --info-bg:#1e3a5f;--info-co:#93C5FD;
        --ok-bg:#14321e;--ok-co:#4ADE80;--ok-border:#4ADE80;
        --warn-bg:#3a2800;--warn-co:#FCD34D;
        --danger-bg:#3a0f1a;--danger-co:#FB7185;
        --muted-bg:#252525;--muted-co:#aaaaaa;
        --new-bg:#1e1a3f;--new-co:#A5B4FC;
      }
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    button,input,textarea,a,[role='button'],[role='checkbox']{touch-action:manipulation}
    html,body{height:100%;background:var(--bg)}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:var(--text);max-width:520px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}

    /* ── Header ── */
    .controls-top{position:sticky;top:0;z-index:10}
    .hd{padding:1.25rem 1.25rem 1rem;border-bottom:.5px solid var(--border);background:var(--bg2)}
    .hd-r{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
    .hd-left{display:flex;align-items:center;gap:10px;margin-bottom:4px}
    .ttl{font-size:18px;font-weight:600;color:var(--text)}
    .sub{font-size:13px;color:var(--text2);font-style:italic;outline:none;border-bottom:1px solid transparent;transition:border-color .2s,background .2s;padding:2px 6px;border-radius:6px;display:inline-block;min-width:20px;cursor:text}
    .sub:focus{border-bottom-color:var(--border2);background:var(--bg3)}
    .sub:empty::before{content:"sous-titre…";color:var(--text3)}
    .cnt{text-align:center;background:var(--bg);border:.5px solid var(--border2);border-radius:var(--radius);padding:8px 14px;min-width:54px;flex-shrink:0}
    .cn{font-size:22px;font-weight:600;color:var(--text);line-height:1}
    .ct{font-size:11px;color:var(--text3);margin-top:2px}
    .call-open-btn{background:none;border:.5px solid var(--border2);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s,color .15s}
    .call-open-btn:not(:disabled):hover{background:var(--bg3);color:var(--text)}
    .call-open-btn:disabled{opacity:.3;cursor:default}
    .bell-btn{position:relative;background:none;border:.5px solid var(--border2);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s,color .15s;flex-shrink:0}
    .bell-btn:not([data-empty]):hover{background:var(--bg3);color:var(--text)}
    .bell-btn[data-empty="1"]{opacity:.4}
    .bell-badge{position:absolute;top:-5px;right:-5px;min-width:16px;height:16px;padding:0 4px;border-radius:10px;background:var(--danger-co);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
    .likes{display:flex;gap:6px;margin-left:auto;flex-shrink:0}
    .lk{display:inline-flex;align-items:center;gap:2px;background:none;border:none;padding:2px 3px;cursor:pointer;color:var(--text3);font-size:14px;line-height:1;transition:transform .15s,color .15s;font-family:inherit}
    .lk .lk-l{font-size:10px;font-weight:700}
    .lk:active{transform:scale(1.25)}
    .lk.on{color:#E0245E}
    .back-btn{background:none;border:.5px solid var(--border2);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .15s,color .15s;flex-shrink:0}
    .back-btn:hover{background:var(--bg3);color:var(--text)}
    .home{padding:14px 1.25rem 2rem}
    .home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .home-card{display:flex;flex-direction:column;align-items:flex-start;gap:9px;padding:16px 14px;border:.5px solid var(--border2);border-radius:14px;background:var(--bg2);cursor:pointer;font-family:inherit;text-align:left;transition:transform .12s,background .15s}
    .home-card:active{transform:scale(.97)}
    .home-card:hover{background:var(--bg3)}
    .hc-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px}
    .hc-l{font-size:15px;font-weight:600;color:var(--text)}
    .hc-n{font-size:12px;color:var(--text3)}
    .home-all{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border:.5px solid var(--border2);border-radius:14px;background:none;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s}
    .home-all:active{background:var(--bg3)}
    .login-wrap{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .login-card{width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;padding:24px 20px;border:.5px solid var(--border2);border-radius:16px;background:var(--bg2)}
    .login-ttl{font-size:20px;font-weight:600;color:var(--text);text-align:center}
    .login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:6px}
    .login-in{padding:12px 14px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:16px;font-family:inherit;outline:none}
    .login-in:focus{border-color:var(--border3)}
    .login-btn{padding:13px;border:none;border-radius:var(--radius);background:var(--text);color:var(--bg);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
    .login-btn:active{opacity:.8}
    .login-msg{font-size:13px;color:var(--danger-co);text-align:center;min-height:18px}

    /* ── Filters ── */
    .flt{display:flex;gap:6px;padding:10px 1.25rem;border-bottom:.5px solid var(--border);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;background:var(--bg2)}
    .flt::-webkit-scrollbar{display:none}
    .fb{padding:6px 13px;border-radius:20px;border:.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;flex-shrink:0}
    .fb:hover{background:var(--bg3)}
    .fb.fa{background:var(--text);color:var(--bg);border-color:var(--text)}
    .flt-sep{width:.5px;background:var(--border2);margin:4px 2px;flex-shrink:0}
    .surprise-btn{color:var(--text3);padding:6px 10px}
    .surprise-btn:active{background:var(--warn-bg)!important;color:var(--warn-co)!important}

    /* ── Add bar ── */
    .ab{display:flex;gap:8px;padding:10px 1.25rem;border-bottom:.5px solid var(--border);background:var(--bg2)}
    .ab input{flex:1;padding:10px 14px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border .15s}
    .ab input:focus{border-color:var(--border3)}
    .ab input::placeholder{color:var(--text3)}
    .abtn{width:44px;height:44px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;transition:background .15s}
    .abtn:active{background:var(--bg3)}

    /* ── List items ── */
    .itm{border-bottom:.5px solid var(--border);transition:opacity .2s}
    .itm.dn{opacity:.4}
    @keyframes flash-bg{0%{background:var(--warn-bg)}70%{background:var(--warn-bg)}100%{background:transparent}}
    .itm.flash{animation:flash-bg 2s ease forwards}
    .im{display:flex;align-items:flex-start;gap:12px;padding:13px 1.25rem;cursor:pointer;transition:background .12s;user-select:none}
    .im:active{background:var(--bg2)}
    @media(hover:hover){.im:hover{background:var(--bg2)}}
    .ck{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;cursor:pointer;transition:all .2s}
    .ck.cd{border-width:2px;border-color:var(--ok-border);background:var(--ok-bg)}
    .ic{flex:1;min-width:0}
    .im2{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
    .tg{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px 2px 6px;border-radius:20px}
    .tg i{font-size:11px}
    .dt{font-size:11px;color:var(--text3)}
    .tx{font-size:15px;line-height:1.45;color:var(--text);transition:all .2s}
    .dnt{text-decoration:line-through;color:var(--text3)!important}
    .xb{background:none;border:none;padding:2px 0;cursor:pointer;color:var(--text3);flex-shrink:0;font-size:16px;margin-top:1px;transition:transform .2s;font-family:inherit}
    .xb.xbo{transform:rotate(180deg)}
    .iq{padding:0 1.25rem 14px 3.5rem}
    .ql{font-size:13px;line-height:1.55;padding:7px 12px;border-left:2px solid var(--border2);margin-bottom:6px;color:var(--text2)}
    .ql:last-child{margin-bottom:0}
    .qw{font-weight:600;color:var(--text)}
    .ds-hd{display:flex;align-items:center;gap:10px;padding:14px 1.25rem 8px}
    .dl{flex:1;height:.5px;background:var(--border)}
    .dlb{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
    .emp{padding:2.5rem 1.25rem;text-align:center;color:var(--text2);font-size:14px}
    .bottom{height:2rem}


    /* ── Add form expanded ── */
    .ab-full{display:flex;flex-direction:column;gap:6px;padding:10px 1.25rem;border-bottom:.5px solid var(--border);background:var(--bg2)}
    .ab-row{display:flex;gap:8px;align-items:center}
    .ab-who{font-size:12px;font-weight:600;color:var(--text3);width:46px;flex-shrink:0;text-align:right}
    .ab-qi{flex:1;padding:8px 12px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
    .ab-qi:focus{border-color:var(--border3)}
    .ab-qi::placeholder{color:var(--text3)}
    .ab-expand{width:40px;height:44px;border-radius:var(--radius);border:.5px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:background .15s}
    .ab-expand:active{background:var(--bg3)}
    .iq-call-btn{display:flex;align-items:center;gap:6px;margin-top:8px;padding:7px 12px;border:none;border-radius:8px;background:var(--info-bg);color:var(--info-co);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s}
    .iq-call-btn:active{opacity:.7}
    .iq-del-btn{display:flex;align-items:center;gap:6px;margin-top:6px;padding:7px 12px;border:none;border-radius:8px;background:var(--danger-bg);color:var(--danger-co);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s}
    .iq-del-btn:active{opacity:.7}
    .iq-del-confirm{background:var(--danger-co);color:#fff}
    /* ── Notes in call mode ── */
    .c-notes{padding:0.75rem 1.25rem 0.5rem;flex:1;display:flex;flex-direction:column;min-height:140px}
    .c-notes-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
    .c-notes-area{width:100%;flex:1;min-height:100px;padding:12px 14px;border:.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:16px;font-family:inherit;resize:none;outline:none;line-height:1.65;transition:border .15s;overflow-y:auto}
    .c-notes-area:focus{border-color:var(--border3)}
    .c-notes-area::placeholder{color:var(--text3)}

    /* ── Call mode overlay ── */
    #call-overlay{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);overflow-y:auto}
    .cw{max-width:520px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
    .c-hd{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:.5px solid var(--border);background:var(--bg2);position:sticky;top:0}
    .c-hd-title{font-size:15px;font-weight:600;color:var(--text)}
    .c-hd-prog{font-size:13px;color:var(--text3);min-width:50px;text-align:right}
    .c-close{background:none;border:none;cursor:pointer;color:var(--text2);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:18px;font-family:inherit}
    .c-close:active{background:var(--bg3)}
    .c-card{flex:0 0 auto;padding:2rem 1.5rem 1.5rem;display:flex;flex-direction:column;gap:1rem;transition:flex-basis .3s ease,opacity .3s ease;overflow:hidden}
    .c-meta{display:flex;align-items:center;gap:10px}
    .c-text{font-size:22px;font-weight:500;line-height:1.4;color:var(--text)}
    .c-quotes{border-left:2px solid var(--border2);padding-left:12px;display:flex;flex-direction:column;gap:8px;margin-top:4px}
    .c-swipe-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:auto;padding-top:1rem}
    .c-nav{display:flex;gap:8px;align-items:center;justify-content:center;padding:.875rem 1.25rem;padding-bottom:calc(.875rem + env(safe-area-inset-bottom));border-top:none;background:transparent;position:sticky;bottom:0}
    .c-btn{border:none;border-radius:12px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s;padding:14px}
    .c-btn:disabled{opacity:.25;cursor:default}
    .c-btn:not(:disabled):active{opacity:.65}
    .c-btn-ghost{background:transparent;border:none;color:var(--text3);flex:0 0 36px;padding:12px 0}
    .c-btn-done{background:var(--ok-bg);color:var(--ok-co);border:1px solid var(--ok-border);flex:1}
    .c-btn-skip{background:var(--bg3);color:var(--text2);flex:0 0 50px;padding:14px 0;font-size:18px}
    .c-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:2rem;text-align:center;color:var(--text2);font-size:15px}
    .iq-notes-btn{display:flex;align-items:center;gap:6px;margin-top:6px;padding:7px 12px;border:none;border-radius:8px;background:var(--warn-bg);color:var(--warn-co);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:opacity .15s}
    .iq-notes-btn:active{opacity:.7}
    .cat-picker{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:6px 0 2px;-webkit-overflow-scrolling:touch;margin-bottom:6px}
    .cat-picker::-webkit-scrollbar{display:none}
    .cat-opt{padding:4px 11px;border-radius:20px;border:.5px solid var(--border2);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;background:transparent;color:var(--text2);flex-shrink:0;transition:all .15s;-webkit-appearance:none}
    .cat-opt.cat-sel{background:var(--text);color:var(--bg);border-color:var(--text)}
    .tx-wrap{display:flex;align-items:flex-start;gap:8px}
    .tx-editable{flex:1;cursor:text;padding-bottom:3px;border-bottom:1.5px solid transparent;transition:border-color .15s;outline:none;-webkit-user-select:text;user-select:text}
    .tx-editable:focus{border-bottom-color:var(--ok-border)}
    .tx-edit-hint{color:var(--text3);margin-top:3px;flex-shrink:0;opacity:.6}
    .iq-edit-row{display:flex;gap:6px;align-items:flex-start;margin-bottom:8px}
    .iq-edit-who{width:72px;flex-shrink:0;padding:6px 8px;border:.5px solid var(--border2);border-radius:8px;font-size:12px;font-weight:600;background:var(--bg);color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none}
    .iq-edit-txt{flex:1;padding:7px 10px;border:.5px solid var(--border2);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;resize:none;line-height:1.4;min-height:48px;overflow-y:hidden;-webkit-appearance:none}
    .iq-edit-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:2px;flex-shrink:0;margin-top:4px;font-family:inherit}
    .iq-add-quote{display:flex;align-items:center;justify-content:center;gap:6px;background:none;border:.5px dashed var(--border2);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--text3);cursor:pointer;font-family:inherit;margin-top:4px;width:100%}
    .iq-save-btn{display:flex;align-items:center;gap:5px;margin-top:8px;padding:7px 14px;border:none;border-radius:8px;background:var(--ok-bg);color:var(--ok-co);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
    .iq-edit-toggle{display:flex;align-items:center;gap:5px;margin-top:6px;padding:7px 12px;border:none;border-radius:8px;background:var(--bg3);color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
    /* ── Search bar ── */
    .search-bar{display:flex;align-items:center;gap:10px;padding:8px 1.25rem;border-bottom:.5px solid var(--border);background:var(--bg2)}
    .search-bar input{flex:1;border:none;background:transparent;color:var(--text);font-size:16px;font-family:inherit;outline:none}
    .search-bar input::placeholder{color:var(--text3)}
    .search-bar button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;display:flex;align-items:center;padding:2px}
    #sync-dot{font-size:12px;opacity:0;transition:opacity .3s;display:flex;align-items:center;margin-top:3px;justify-content:center;height:16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .c-done-inline{padding:6px 20px;border-radius:20px;border:1.5px solid #16A34A;background:transparent;color:#16A34A;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .15s;flex-shrink:0;-webkit-appearance:none;min-width:90px;justify-content:center}
    .c-done-inline:active{background:var(--ok-bg)}
    /* ── Score ── */
    .hd-scores{display:flex;align-items:center;gap:16px;margin-top:10px;padding-top:10px;border-top:.5px solid var(--border)}
    .hd-score{display:flex;align-items:center;gap:8px}
    .hs-init{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .hs-total{font-size:22px;font-weight:500;color:var(--text)}
    .hs-lbl{font-size:11px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
    .c-score{padding:.75rem 1.5rem 1rem;background:transparent;flex-shrink:0}
    .c-score-row{display:flex;align-items:center;gap:10px;padding:5px 0}
    .c-dots{display:flex;gap:7px;flex:1}
    .c-dot{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;padding:0;transition:all .15s;flex-shrink:0;-webkit-appearance:none}
    .c-dot:active{transform:scale(.9)}
    .c-dot-g{border-color:#4F7CAC;background:#4F7CAC}
    .c-dot-i{border-color:#9B72AA;background:#9B72AA}
    .c-score-val{font-size:17px;font-weight:500;min-width:22px;text-align:right}
    /* ── Toast undo ── */
    #toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:300;display:flex;align-items:center;gap:14px;background:var(--text);color:var(--bg);padding:12px 18px;border-radius:14px;font-size:14px;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.25);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;transform:translateX(-50%) translateY(8px)}

/* ── Save subjects ── */
async function save(){
  setSyncStatus('saving');
  if(db){
    try{await db.from('Liste').upsert({id:1,data:subj,subtitle:currentSubtitle});setSyncStatus('saved');}catch(e){setSyncStatus('offline');}
  }else{
    try{localStorage.setItem(SK,JSON.stringify(subj));setSyncStatus('saved');}catch{setSyncStatus('offline');}
  }
}

/* ── Save subtitle ── */
async function saveSub(text) {
  currentSubtitle = text;
  if (db) {
    try { await db.from('Liste').upsert({ id: 1, data: subj, subtitle: text }); } catch {}
  } else {
    try { localStorage.setItem(SK+'-sub', text); } catch {}
  }
}

/* ── Real-time ── */
function setupRealtime(){
  if(!db)return;
  const h=p=>{if(!p.new?.data)return;subj=p.new.data;if(p.new?.subtitle)currentSubtitle=p.new.subtitle;render();if(callMode)renderCall();};
  const conn=()=>{try{if(realtimeChannel)realtimeChannel.unsubscribe();realtimeChannel=db.channel('l-'+Date.now()).on('postgres_changes',{event:'*',schema:'public',table:'Liste'},h).subscribe();}catch(e){}};
  conn();
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&realtimeChannel?.state!=='joined')conn();});
  setInterval(()=>{if(db&&realtimeChannel?.state!=='joined')conn();},45000);
}

/* ── Actions ── */
function tgDone(id, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  const cur = subj.find(s => s.id === id);
  const wasUndone = cur && !cur.done;
  subj = subj.map(s => s.id === id ? {...s, done: !s.done} : s);
  if (wasUndone) {
    clearTimeout(window._undoTimer);
    undoState = { id, text: cur.text };
    window._undoTimer = setTimeout(() => { undoState = null; updateToast(); }, 3500);
  } else {
    clearTimeout(window._undoTimer);
    undoState = null;
  }
  save(); render();
}

function undoDone() {
  if (!undoState) return;
  clearTimeout(window._undoTimer);
  subj = subj.map(s => s.id === undoState.id ? {...s, done: false} : s);
  undoState = null;
  save(); render();
}

function updateToast() {
  const t = document.getElementById('toast');
  if (!t) return;
  if (undoState) {
    const short = undoState.text.length > 28 ? undoState.text.slice(0, 28) + '…' : undoState.text;
    t.innerHTML = `<span>Traité : ${short}</span><button onclick="undoDone()">Annuler</button>`;
    t.classList.add('show');
  } else {
    t.classList.remove('show');
  }
}
function tgExp(id) { exp = (exp === id) ? null : id; render(); }
/* ── Like (coeur par personne) ── */
function toggleLike(id, p, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  const k = p === 'G' ? 'likeG' : 'likeI';
  subj = subj.map(s => s.id === id ? {...s, [k]: !s[k]} : s);
  save(); render();
}
/* ── Nouveautes (cloche + compteur) ── */
function seeNew() {
  const ids = subj.filter(s => (s.id||0) > lastSeen).map(s => s.id);
  if (!ids.length) return;
  newFlash = new Set(ids);
  lastSeen = subj.reduce((m,s) => Math.max(m, s.id||0), 0);
  try { localStorage.setItem('liste-lastseen', String(lastSeen)); } catch {}
  render();
  const target = document.getElementById('itm-' + ids[0]);
  if (target) target.scrollIntoView({behavior:'smooth', block:'center'});
  clearTimeout(window._nfTimer);
  window._nfTimer = setTimeout(() => { newFlash = new Set(); render(); }, 2600);
}
function setF(f) { filt = f; exp = null; render(); }
/* ── Migration catégories (one-shot, idempotent) ── */
function migrate() {
  let changed = false;
  const valid = {chitchat:1, films:1, todo:1, voyages:1};
  subj = subj.map(s => {
    if (valid[s.cat]) return s;
    const cat = VOYAGE_IDS.includes(s.id) ? 'voyages' : (CAT_MAP[s.cat] || 'todo');
    changed = true;
    return {...s, cat};
  });
  return changed;
}
/* ── Navigation accueil / listes ── */
function pendScope() { return subj.filter(s => !s.done && (scope === 'all' || s.cat === scope)); }
function openList(k) { scope = k; filt = 'all'; exp = null; searchOpen = false; searchQuery = ''; view = 'list'; window.scrollTo(0,0); render(); }
function goHome() { view = 'home'; scope = 'all'; filt = 'all'; exp = null; searchOpen = false; searchQuery = ''; window.scrollTo(0,0); render(); }
function homeSearch() { scope = 'all'; filt = 'all'; view = 'list'; searchOpen = true; searchQuery = ''; window.scrollTo(0,0); render(); setTimeout(() => document.getElementById('sq')?.focus(), 50); }
function addS() {
  const inp = document.getElementById('ns');
  const t = inp.value.trim(); if (!t) return;
  const d = new Date();
  const ds = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  const q = [];
  const qg = document.getElementById('qg')?.value.trim();
  const qi = document.getElementById('qi')?.value.trim();
  if (qg) q.push({w:'Gabriel', t:qg});
  if (qi) q.push({w:'Iris', t:qi});
  const cat = (scope && scope !== 'all') ? scope : 'chitchat';
  subj = [{id:Date.now(), text:t, cat, date:ds, done:false, q, notes:''}, ...subj];
  inp.value = '';
  formExpanded = false;
  save(); render();
}

/* ── Surprise ── */
function surprise() {
  const pool = pendScope();
  if (!pool.length) return;
  openCallAt(pool[Math.floor(Math.random() * pool.length)].id);
}

/* ── Call mode ── */
function openCallMode() {
  const pending = pendScope();
  if (!pending.length) return;
  callMode = true; callIdx = 0;
  document.getElementById('app').style.display = 'none';
  document.getElementById('call-overlay').style.display = 'block';
  renderCall();
}
function closeCallMode() {
  callMode = false;
  document.getElementById('call-overlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}
function callNav(dir) {
  const pending = pendScope();
  if (pending.length <= 1) return;
  callIdx = (callIdx + dir + pending.length) % pending.length;
  renderCall();
}
function callMarkDone() {
  const pending = pendScope();
  if (!pending.length) return;
  const cur = pending[callIdx];
  subj = subj.map(s => s.id === cur.id ? {...s, done: true} : s);
  save();
  const newPending = pendScope();
  if (!newPending.length) { closeCallMode(); render(); return; }
  if (callIdx >= newPending.length) callIdx = 0;
  renderCall();
}

function renderCall() {
  const overlay = document.getElementById('call-overlay');
  const pending = pendScope();
  if (!pending.length) { closeCallMode(); return; }
  const s = pending[callIdx];

  overlay.innerHTML = `

  </div>
  <div class="c-card" id="c-card">
    <div class="c-meta">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <span class="tg" style="background:${c.bg};color:${c.co}"><i class="ti ${c.i}"></i> ${c.l}</span>
        <span class="dt">${esc(s.date)}</span>
      </div>
      <button class="c-done-inline" onclick="callMarkDone()" style="margin-left:auto"><i class="ti ti-check" style="font-size:12px"></i> traité</button>
    </div>
    <p class="c-text">${esc(s.text)}</p>
    ${s.q && s.q.length ? `<div class="c-quotes">${s.q.map(q=>`<div class="ql"><span class="qw" style="color:${speakerColor(q.w)}">${esc(q.w)}\u00a0:</span> \u00ab\u00a0${esc(q.t)}\u00a0\u00bb</div>`).join('')}</div>` : ''}
  </div>
  <div class="c-score">
    ${mkScore(s,'G','#4F7CAC')}
    ${mkScore(s,'I','#9B72AA')}
  </div>
  <div class="c-notes">
    <div class="c-notes-lbl"><i class="ti ti-notes" style="font-size:13px"></i> Notes</div>
    <textarea class="c-notes-area" placeholder="Note sur ce sujet…" oninput="updateNote(${s.id},this.value)">${s.notes||''}</textarea>
  </div>
  <div class="c-nav">
    <button class="c-btn c-btn-ghost" onclick="callNav(-1)" ${!multi?'disabled':''}><i class="ti ti-arrow-left"></i></button>
    <span class="c-nav-hint">${multi ? '← glisser pour naviguer →' : ''}</span>
    <button class="c-btn c-btn-ghost" onclick="callNav(1)" ${!multi?'disabled':''}><i class="ti ti-arrow-right"></i></button>
  </div>
</div>`;

  const card = document.getElementById('c-card');
  if (card && multi) {
    let sx = 0;
    card.addEventListener('touchstart', e => { sx = e.changedTouches[0].clientX; }, { passive: true });
    card.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - sx;
      if (Math.abs(dx) > 55) callNav(dx < 0 ? 1 : -1);
    }, { passive: true });
  }
}

      ${!dn?`<div class="cat-picker">${Object.entries(CM).map(([k,v])=>`<button class="cat-opt${s.cat===k?' cat-sel':''}" onclick="event.stopPropagation();saveCat(${s.id},'${k}')">${v.l}</button>`).join('')}</div>`:''}

/* ── Speaker colors ── */
function speakerColor(w){
  if(w==='Gabriel')return'#4F7CAC';
  if(w==='Iris')return'#9B72AA';
  return'var(--text)';
}
/* ── Sync ── */
function setSyncStatus(s){
  syncStatus=s;updateSyncDot();
  if(s==='saved'){clearTimeout(window._st);window._st=setTimeout(()=>{syncStatus='idle';updateSyncDot();},2000);}
}
function updateSyncDot(){
  const el=document.getElementById('sync-dot');
  if(!el)return;
  if(syncStatus==='saving'){el.style.opacity='1';el.style.color='var(--text3)';el.innerHTML='<i class="ti ti-refresh" style="font-size:12px;display:inline-block;animation:spin .8s linear infinite"></i>';}
  else if(syncStatus==='saved'){el.style.opacity='1';el.style.color='var(--ok-co)';el.innerHTML='<i class="ti ti-check" style="font-size:12px"></i>';}
  else if(syncStatus==='offline'){el.style.opacity='1';el.style.color='var(--danger-co)';el.innerHTML='<i class="ti ti-wifi-off" style="font-size:12px"></i>';}
  else{el.style.opacity='0';}
}
/* ── Search ── */
function toggleSearch(){
  searchOpen=!searchOpen;
  if(!searchOpen)searchQuery='';
  render();
  if(searchOpen)setTimeout(()=>document.getElementById('sq')?.focus(),50);
}
/* ── Notes ── */
function updateNote(id, text) {
  subj = subj.map(s => s.id === id ? {...s, notes: text} : s);
  clearTimeout(window._nst);
  window._nst = setTimeout(save, 900);
}

/* ── Open call mode at specific subject ── */
function openCallAt(id) {
  const pending = pendScope();
  const idx = pending.findIndex(s => s.id === id);
  callIdx = idx >= 0 ? idx : 0;
  callMode = true;
  document.getElementById('app').style.display = 'none';
  document.getElementById('call-overlay').style.display = 'block';
  renderCall();
}

/* ── Edit category ── */
function saveCat(id, cat) {
  subj = subj.map(s => s.id === id ? {...s, cat} : s);
  save(); render();
}

/* ── Edit title ── */
function saveTitleText(id, text) {
  const t = (text || '').trim();
  if (!t) return;
  subj = subj.map(s => s.id === id ? {...s, text: t} : s);
  save();
}

/* ── Edit quotes ── */
function toggleEditQuotes(id, e) {
  if (e) e.stopPropagation();
  editingId = editingId === id ? null : id;
  render();
}
function updateQuoteText(id, idx, text) {
  subj = subj.map(s => {
    if (s.id !== id) return s;
    const q = [...(s.q||[])]; q[idx] = {...q[idx], t: text}; return {...s, q};
  });
  save();
}
function updateQuoteWho(id, idx, who) {
  subj = subj.map(s => {
    if (s.id !== id) return s;
    const q = [...(s.q||[])]; q[idx] = {...q[idx], w: who}; return {...s, q};
  });
  save();
}
function removeQuote(id, idx, e) {
  if (e) e.stopPropagation();
  subj = subj.map(s => s.id !== id ? s : {...s, q: (s.q||[]).filter((_,i) => i!==idx)});
  save(); render();
}
function addQuote(id, e) {
  if (e) e.stopPropagation();
  subj = subj.map(s => s.id !== id ? s : {...s, q: [...(s.q||[]), {w:'Gabriel', t:''}]});
  save(); render();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.iq-edit-txt');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

/* ── Notes direct access ── */
function openCallAtNotes(id) {
  openCallAt(id);
  setTimeout(() => {
    const ta = document.querySelector('#call-overlay .c-notes-area');
    if (ta) ta.focus();
  }, 180);
}

/* ── Delete ── */
function requestDelete(id) {
  deletePending = id;
  render();
  clearTimeout(window._dpTimer);
  window._dpTimer = setTimeout(() => { deletePending = null; render(); }, 3000);
}
function confirmDelete(id) {
  subj = subj.filter(s => s.id !== id);
  deletePending = null;
  exp = null;
  save(); render();
}

/* ── Title ── */
function saveTitle(text) {
  currentTitle = text || 'Liste interminable';
  try { localStorage.setItem('sujets-ig-title', currentTitle); } catch {}
}

/* ── Score ── */
function setScore(id, p, v) {
  const k = p === 'G' ? 'scoreG' : 'scoreI';
  subj = subj.map(s => s.id === id ? {...s, [k]: v} : s);
  save(); renderCall(); updateScoreBadges();
}
function mkScore(s, p, col) {
  const sc = p === 'G' ? (s.scoreG||0) : (s.scoreI||0);
  const cls = p === 'G' ? 'c-dot-g' : 'c-dot-i';
  const dots = [1,2,3,4,5].map(v =>
    `<button class="c-dot${sc>=v?' '+cls:''}" onclick="setScore(${s.id},'${p}',${sc===v?0:v})" aria-label="${v}"></button>`
  ).join('');
  return `<div class="c-score-row"><span style="color:${col};font-size:13px;font-weight:600;min-width:58px">${p==='G'?'Gabriel':'Iris'}</span><div class="c-dots">${dots}</div><span class="c-score-val" style="color:${col}">${sc}/5</span></div>`;
}
function updateScoreBadges() {
  const hd = document.querySelector('.hd');
  if (!hd) return;
  let el = hd.querySelector('.hd-scores');
  if (!el) { el = document.createElement('div'); el.className = 'hd-scores'; hd.appendChild(el); }
  const tg = subj.reduce((a,s) => a+(s.scoreG||0), 0);
  const ti = subj.reduce((a,s) => a+(s.scoreI||0), 0);
  el.innerHTML = `
    <div class="hd-score"><span class="hs-init" style="background:rgba(79,124,172,.15);color:#4F7CAC">G</span><span class="hs-total">${tg}</span><span class="hs-lbl">pts</span></div>
    <div class="hd-score"><span class="hs-init" style="background:rgba(155,114,170,.15);color:#9B72AA">I</span><span class="hs-total">${ti}</span><span class="hs-lbl">pts</span></div>`;
}
/* ── Sticky ── */
function updateSticky() {
  const hd = document.querySelector('.hd');
  const sb = document.querySelector('.search-bar');
  const flt = document.querySelector('.flt');
  const ab = document.querySelector('.ab');
  if (!flt || !ab) return;
  let top = hd ? hd.offsetHeight : 0;
  if (sb) { sb.style.position='sticky'; sb.style.zIndex='9'; sb.style.background='var(--bg2)'; sb.style.top=top+'px'; top+=sb.offsetHeight; }
  flt.style.top = top+'px';
  top += flt.offsetHeight;
  ab.style.top = top+'px';
}

/* ── Auth (login + session) ── */
async function boot() {
  if (db) {
    try {
      const { data: { session } } = await db.auth.getSession();
      if (!session) { renderLogin(); return; }
    } catch(e) { renderLogin(); return; }
    db.auth.onAuthStateChange((ev, sess) => { if (!sess) renderLogin(); });
  }
  load();
}

<div class="login-wrap">

    <div class="login-sub">Connexion réservée à Gabriel & Iris</div>
    <input id="lg-email" class="login-in" type="email" inputmode="email" autocomplete="username" placeholder="Email"/>
    <input id="lg-pass" class="login-in" type="password" autocomplete="current-password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">Se connecter</button>
    <div id="lg-msg" class="login-msg">${msg ? esc(msg) : ''}</div>
  </div>
</div>`;
}
async function doLogin() {
  const email = document.getElementById('lg-email')?.value.trim();
  const pass = document.getElementById('lg-pass')?.value;
  const msg = document.getElementById('lg-msg');
  if (!email || !pass) { if (msg) msg.textContent = 'Email et mot de passe requis.'; return; }
  if (msg) { msg.style.color = 'var(--text3)'; msg.textContent = 'Connexion…'; }
  try {
    const { error } = await db.auth.signInWithPassword({ email, password: pass });
    if (error) { if (msg) { msg.style.color = 'var(--danger-co)'; msg.textContent = 'Échec : ' + error.message; } return; }
    load();
  } catch(e) { if (msg) { msg.style.color = 'var(--danger-co)'; msg.textContent = 'Erreur : ' + (e.message || e); } }
}
async function doLogout() {
  try { await db.auth.signOut(); } catch {}
  if (realtimeChannel) { try { realtimeChannel.unsubscribe(); } catch {} realtimeChannel = null; }
  renderLogin('Déconnecté.');
}
boot();
</script>
</body>
</html>
