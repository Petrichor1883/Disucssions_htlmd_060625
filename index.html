<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Nos sujets"/>
  <title>Nos sujets en attente</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css"/>
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f5f5f5;
      --bg3: #efefef;
      --text: #111111;
      --text2: #555555;
      --text3: #999999;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.15);
      --border3: rgba(0,0,0,0.25);
      --info-bg: #EFF6FF;
      --info-co: #1D4ED8;
      --ok-bg: #F0FDF4;
      --ok-co: #16A34A;
      --ok-border: #16A34A;
      --warn-bg: #FFFBEB;
      --warn-co: #D97706;
      --danger-bg: #FFF1F2;
      --danger-co: #E11D48;
      --muted-bg: #F5F5F5;
      --muted-co: #555555;
      --new-bg: #F0F0FF;
      --new-co: #4F46E5;
      --radius: 10px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --bg2: #1c1c1c;
        --bg3: #252525;
        --text: #f0f0f0;
        --text2: #aaaaaa;
        --text3: #666666;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.15);
        --border3: rgba(255,255,255,0.25);
        --info-bg: #1e3a5f;
        --info-co: #93C5FD;
        --ok-bg: #14321e;
        --ok-co: #4ADE80;
        --ok-border: #4ADE80;
        --warn-bg: #3a2800;
        --warn-co: #FCD34D;
        --danger-bg: #3a0f1a;
        --danger-co: #FB7185;
        --muted-bg: #252525;
        --muted-co: #aaaaaa;
        --new-bg: #1e1a3f;
        --new-co: #A5B4FC;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      max-width: 520px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* ── Header ── */
    .hd {
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .hd-r { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .ttl { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .sub { font-size: 13px; color: var(--text2); font-style: italic; }
    .cnt {
      text-align: center;
      background: var(--bg);
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      padding: 8px 14px;
      min-width: 54px;
      flex-shrink: 0;
    }
    .cn { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; }
    .ct { font-size: 11px; color: var(--text3); margin-top: 2px; }
    /* ── Filters ── */
    .flt {
      display: flex;
      gap: 6px;
      padding: 10px 1.25rem;
      border-bottom: 0.5px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      background: var(--bg2);
    }
    .flt::-webkit-scrollbar { display: none; }
    .fb {
      padding: 6px 13px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: all .15s;
    }
    .fb.fa { background: var(--text); color: var(--bg); border-color: var(--text); }
    /* ── Add bar ── */
    .ab {
      display: flex;
      gap: 8px;
      padding: 10px 1.25rem;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg2);
    }
    .ab input {
      flex: 1;
      padding: 10px 14px;
      border: 0.5px solid var(--border2);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border .15s;
    }
    .ab input:focus { border-color: var(--border3); }
    .ab input::placeholder { color: var(--text3); }
    .abtn {
      width: 44px; height: 44px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      transition: background .15s;
    }
    .abtn:active { background: var(--bg3); }
    /* ── Items ── */
    .itm { border-bottom: 0.5px solid var(--border); transition: opacity .2s; }
    .itm.dn { opacity: .4; }
    .im {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 1.25rem;
      cursor: pointer;
      transition: background .12s;
      user-select: none;
    }
    .im:active { background: var(--bg2); }
    @media (hover: hover) { .im:hover { background: var(--bg2); } }
    .ck {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
      cursor: pointer;
      transition: all .2s;
    }
    .ck.cd { border-width: 2px; border-color: var(--ok-border); background: var(--ok-bg); }
    .ic { flex: 1; min-width: 0; }
    .im2 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
    .tg {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 500;
      padding: 2px 8px 2px 6px;
      border-radius: 20px;
    }
    .tg i { font-size: 11px; }
    .dt { font-size: 11px; color: var(--text3); }
    .tx { font-size: 15px; line-height: 1.45; color: var(--text); transition: all .2s; }
    .dnt { text-decoration: line-through; color: var(--text3) !important; }
    .xb {
      background: none; border: none;
      padding: 2px 0; cursor: pointer;
      color: var(--text3); flex-shrink: 0;
      font-size: 16px; margin-top: 1px;
      transition: transform .2s;
      font-family: inherit;
    }
    .xb.xbo { transform: rotate(180deg); }
    /* ── Quote ── */
    .iq { padding: 0 1.25rem 14px 3.5rem; }
    .ql {
      font-size: 13px; line-height: 1.55;
      padding: 7px 12px;
      border-left: 2px solid var(--border2);
      margin-bottom: 6px;
      color: var(--text2);
    }
    .ql:last-child { margin-bottom: 0; }
    .qw { font-weight: 600; color: var(--text); }
    /* ── Done section ── */
    .ds-hd { display: flex; align-items: center; gap: 10px; padding: 14px 1.25rem 8px; }
    .dl { flex: 1; height: 0.5px; background: var(--border); }
    .dlb { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; }
    .emp { padding: 2.5rem 1.25rem; text-align: center; color: var(--text2); font-size: 14px; }
    .bottom { height: 2rem; }
  </style>
</head>
<body>

<div id="app">
  <p style="padding:2rem;text-align:center;color:#999">Chargement…</p>
</div>

<script>
const SK = 'sujets-ig-v1';

const CM = {
  debate:  { l:'discussion', bg:'var(--info-bg)',   co:'var(--info-co)',   i:'ti-message-2' },
  watch:   { l:'à regarder', bg:'var(--ok-bg)',     co:'var(--ok-co)',     i:'ti-device-tv' },
  do:      { l:'à faire',    bg:'var(--warn-bg)',   co:'var(--warn-co)',   i:'ti-map-pin' },
  story:   { l:'à raconter', bg:'var(--danger-bg)', co:'var(--danger-co)', i:'ti-book-2' },
  project: { l:'projet',     bg:'var(--muted-bg)',  co:'var(--muted-co)',  i:'ti-bulb' },
  new:     { l:'ajouté',     bg:'var(--new-bg)',    co:'var(--new-co)',    i:'ti-sparkles' },
};

const INIT = [
  {id:1,text:"La philosophie de Gabriel sur la peur",cat:"debate",date:"05/05/2026",done:false,q:[
    {w:"Gabriel",t:"Moi j'ai un peu peur mais c'est normal, tu verras j'ai souvent peur mdr. Je développe une philosophie particulière à ce sujet."},
    {w:"Iris",t:"j'ai (encore) hâte d'en savoir plus sur cette philosophie"}]},
  {id:2,text:"Les observations de Gabriel sur Iris (sévères et biaisées)",cat:"debate",date:"03/05/2026",done:false,q:[
    {w:"Gabriel",t:"c'est noté, je te ferais part de mes observations sur le sujet (sévères et biaisés) au moment le plus opportun 😈"},
    {w:"Iris",t:"j'ai étonnamment jamais eu aussi hâte d'entendre les observations d'un inconnu, pourtant sévères et biaisés"}]},
  {id:3,text:"Syndrome de l'imposteur et la petite fille parfaite chez Iris",cat:"debate",date:"03/05/2026",done:false,q:[
    {w:"Iris",t:"j'ai des petits sujets de confiance, de syndrome de l'imposteur et de la petite fille parfaite (mais rien de dramatique, j'y travaille mdrrrr)"}]},
  {id:4,text:"Le cynisme — Gabriel a 2/3 trucs à dire",cat:"debate",date:"05/05/2026",done:false,q:[
    {w:"Gabriel",t:"Oh j'ai 2/3 trucs à dire sur le cynisme aussi — faut noter ça fait bcp de sujets"}]},
  {id:5,text:"L'école et ce qu'on n'y apprend pas",cat:"debate",date:"07/05/2026",done:false,q:[
    {w:"Iris",t:"le sujet de l'école je le note pas je sais qu'on y reviendra naturellement mdrrr"}]},
  {id:6,text:"La théorie d'Iris sur les modes de sortie des séries",cat:"debate",date:"09/05/2026",done:false,q:[
    {w:"Iris",t:"t'as déjà regardé Got ? et si oui, tu l'as regardé genre en cours de sortie ou d'un coup ? (oui j'ai une théorie sur les modes de sortie des séries)"},
    {w:"Iris",t:"je vais la garder encore un peu sous le coude, je vais peaufiner mes arguments"}]},
  {id:7,text:"La respiration pour s'endormir — technique exacte",cat:"debate",date:"20-21/05/2026",done:false,q:[
    {w:"Iris",t:"sérieux tu fais des exercices de respiration pour t'endormir ? et ça fonctionne plutôt bien ?"},
    {w:"Gabriel",t:"+1 sujet"}]},
  {id:8,text:"L'IA qui refait les scènes traumatisantes de GoT — l'avis de Gabriel (exigé !)",cat:"debate",date:"17/05 → 04/06/2026",done:false,q:[
    {w:"Gabriel",t:"D'ailleurs, t'as vu le gars qui a utilisé l'IA pour refaire toutes les scènes traumatisantes de GoT ?"},
    {w:"Iris",t:"je DÉTESTE ce phénomène, hâte qu'on s'en parle — ça fait partie des choses que j'ai du mal à comprendre (rare) donc je veux bien ton avis (j'exige ton avis)"}]},
  {id:9,text:"Les générations — sujet passion de Gabriel",cat:"debate",date:"03/06/2026",done:false,q:[
    {w:"Gabriel",t:"Toute génération se plaint de la suivante et vice versa j'ai l'impression (gros sujet passion aussi ça pour moi !)"}]},
  {id:10,text:"L'enfance idéalisée d'Iris",cat:"debate",date:"04-05/06/2026",done:false,q:[
    {w:"Iris",t:"j'idéalise (beaucoup) mon enfance et du coup je pense que j'ai pas gardé ce genre de trucs en tête"},
    {w:"Gabriel",t:"Je veux en savoir plus sur ton enfance idéalisée du coup hein 😗"}]},
  {id:11,text:"Les films français — débat complet",cat:"debate",date:"06/06/2026",done:false,q:[
    {w:"Iris",t:"le fameux débat historique des films français : saaaalve de questions — que reproches tu sur le principe aux films français ? quels genre de films elle t'a conseillés et qui ont fait mouche ?"},
    {w:"Gabriel",t:"c'est en effet une version tronquée de la conversation que nous aurons d'ici jeudi ou dimanche 😌"}]},
  {id:12,text:"Qui n'est pas \"tout cassé\" dans la vie ?",cat:"debate",date:"06/06/2026",done:false,q:[
    {w:"Gabriel",t:"Sincèrement, qui n'est pas tout cassé ? Vraie question : t'as rencontré des gens pas cassés toi ? Contre uno +1 sujet 😗"}]},
  {id:13,text:"Les passions et métiers pour nos futurs enfants",cat:"debate",date:"06/06/2026",done:false,q:[
    {w:"Iris",t:"est ce qu'il y a des métiers / passions que t'aimerais pas que ton enfant ait / fasse ?"}]},
  {id:14,text:"L'épigénétique — Iris doit expliquer à Gabriel",cat:"debate",date:"06/06/2026",done:false,q:[
    {w:"Iris",t:"t'as déjà entendu parler d'epigénétique ?"},
    {w:"Gabriel",t:"Non ! Même si j'ai envie de dire oui mdrr, donne moi la définition !"}]},
  {id:15,text:"Euphoria S3 — exclu réservée par Iris",cat:"watch",date:"08/05/2026",done:false,q:[
    {w:"Iris",t:"je pose une petite exclu pour que tu regardes avec moi si un jour t'as envie de regarder !"}]},
  {id:16,text:"Game of Thrones — revoir l'intégrale ensemble",cat:"watch",date:"21/05/2026",done:false,q:[
    {w:"Gabriel",t:"Eh, je crois qu'il va vraiment falloir se refaire l'intégrale en fait"}]},
  {id:17,text:"Witch Hat Atelier — à commencer ensemble",cat:"watch",date:"02-03/06/2026",done:false,q:[
    {w:"Gabriel",t:"Pour witch hat, dès l'épisode 1, le cadre de l'histoire est posé : qui est méchant, qui est gentil — l'animation est absolument folle"},
    {w:"Iris",t:"ouuuuh j'ajoute à ma liste alors avant ou après frieren ?"}]},
  {id:18,text:"Roadtrip en Italie (nord au sud)",cat:"do",date:"03-06/06/2026",done:false,q:[
    {w:"Gabriel",t:"Pas le choix, un Road trip s'impose"},
    {w:"Iris",t:"ce roadtrip se fera, pour la culture nous n'avons pas le choix !!"},
    {w:"Gabriel",t:"Le plus accessible pour nous dans un premier temps donc le nord hein ! Mais j'aimerais clairement descendre jusque dans le sud"}]},
  {id:19,text:"La jam de jazz à Paris",cat:"do",date:"05/06/2026",done:false,q:[
    {w:"Gabriel",t:"Je t'y emmènerai si on a l'occasion c'est plus fun quand les autres sont là"},
    {w:"Gabriel",t:"+1 à notre liste délicieusement interminable"}]},
  {id:20,text:"Écouter la playlist de stress d'Iris",cat:"do",date:"05/06/2026",done:false,q:[
    {w:"Iris",t:"sais pas trop comment tu gères ton stress [...] donc me suis dis que j'allais te partager quelques chansons de cette playlist"},
    {w:"Gabriel",t:"J'ai pas encore écouté les musiques mais j'y manquerai pas"}]},
  {id:21,text:"Écouter les enregistrements de jazz de Gabriel",cat:"do",date:"06/06/2026",done:false,q:[
    {w:"Gabriel",t:"J'en ai des enregistrements hehehe je te ferai écouter !"}]},
  {id:22,text:"Goûter la Gambetta limonade",cat:"do",date:"06/06/2026",done:false,q:[
    {w:"Gabriel",t:"Faut que je te fasse goûter Gambetta limonade d'ailleurs !!"}]},
  {id:23,text:"S'ajouter sur LinkedIn",cat:"do",date:"29/05/2026",done:false,q:[
    {w:"Iris",t:"y'a un monde où on s'ajoute sur linkedin avant de s'ajouter sur insta"},
    {w:"Gabriel",t:"MDRRRR c'est vrai qu'il va falloir remédier à ça un jour"}]},
  {id:24,text:"L'anecdote du doigt de pied fêlé de Gabriel (il a une vidéo !)",cat:"story",date:"10/05/2026",done:false,q:[
    {w:"Iris",t:"j'ai SI hâte d'entendre cette histoire de doigt de pieds mdrrrrr (je pensais pas dire ça un jour)"},
    {w:"Gabriel",t:"J'ai même une vidéo à l'appui pour cette anecdote…"}]},
  {id:25,text:"La conversation lunaire dans le BlaBlacar d'Iris",cat:"story",date:"16-18/05/2026",done:false,q:[
    {w:"Iris",t:"je suis embarquée dans une conversation lunaire — fais moi absolument penser à te raconter quand on s'appelle"},
    {w:"Gabriel",t:"D'ailleurs on a pas parlé de cette fameuse conversation lunaire ! Et c'était clairement un pitch de chit chat"}]},
  {id:26,text:"Les Carnets du sous-sol — retour de lecture de Gabriel",cat:"story",date:"02-03/06/2026",done:false,q:[
    {w:"Gabriel",t:"j'engloutissais le début des carnets du sous sol [...] Le deuxième me donne beaucoup de grain à moudre alors que j'en suis à peine au tiers."},
    {w:"Iris",t:"oh tu les as lus / commencés j'adore!! j'ai tellement hâte que tu m'en parles, que tu me racontes 🥰"}]},
  {id:27,text:"Le projet startup de loyers parisiens — mise à jour",cat:"project",date:"03/06/2026",done:false,q:[
    {w:"Gabriel",t:"Je l'ai relancé sur un de ses vieux projets business qui vise à capitaliser sur l'encadrement des loyers Parisien : une plate-forme qui permettrait aux particuliers de récupérer l'excédant prélevé par le proprio sur le loyer irrégulier !"}]},
  {id:28,text:"Svaghino — le mot inventé de la terrasse (Iris doit expliquer)",cat:"project",date:"29/05 → 01/06/2026",done:false,q:[
    {w:"Iris",t:"comment on s'organise demain svaghino ?"},
    {w:"Gabriel",t:"Oh je connais pas ce mot !"},
    {w:"Iris",t:"totalement inventé ahah tiré du mot dont je te parlais l'autre soir sur la terrasse"},
    {w:"Gabriel",t:"ça m'a donné envie m'en reparler avec toi"}]},
];

let subj, filt = 'all', exp = null;

function load() {
  try {
    const raw = localStorage.getItem(SK);
    if (raw) { const p = JSON.parse(raw); if (Array.isArray(p) && p.length) subj = p; }
  } catch {}
  if (!subj) subj = JSON.parse(JSON.stringify(INIT));
  render();
}

function save() {
  try { localStorage.setItem(SK, JSON.stringify(subj)); } catch {}
}

function tgDone(id, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  subj = subj.map(s => s.id === id ? { ...s, done: !s.done } : s);
  save(); render();
}

function tgExp(id) { exp = exp === id ? null : id; render(); }

function setF(f) { filt = f; exp = null; render(); }

function addS() {
  const inp = document.getElementById('ns');
  const t = inp.value.trim();
  if (!t) return;
  const d = new Date();
  const ds = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  subj = [{ id: Date.now(), text: t, cat: 'new', date: ds, done: false, q: [] }, ...subj];
  inp.value = '';
  save(); render();
}

const esc = s => String(s)
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;');

function ri(s) {
  const c = CM[s.cat] || CM.new;
  const isExp = exp === s.id;
  const dn = s.done;
  return `
<div class="itm${dn ? ' dn' : ''}">
  <div class="im" onclick="tgExp(${s.id})">
    <div class="ck${dn ? ' cd' : ''}"
      onclick="tgDone(${s.id}, event)"
      role="checkbox" aria-checked="${dn}" tabindex="0"
      onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();event.stopPropagation();tgDone(${s.id},null)}">
      ${dn ? '<i class="ti ti-check" style="font-size:12px;color:var(--ok-co)"></i>' : ''}
    </div>
    <div class="ic">
      <div class="im2">
        <span class="tg" style="background:${c.bg};color:${c.co}">
          <i class="ti ${c.i}"></i> ${c.l}
        </span>
        <span class="dt">${esc(s.date)}</span>
      </div>
      <div class="tx${dn ? ' dnt' : ''}">${esc(s.text)}</div>
    </div>
    ${s.q && s.q.length
      ? `<button class="xb${isExp ? ' xbo' : ''}"
           onclick="event.stopPropagation();tgExp(${s.id})"
           aria-label="${isExp ? 'Masquer' : 'Voir'} l'extrait">
           <i class="ti ti-chevron-down"></i>
         </button>`
      : '<div style="width:22px;flex-shrink:0"></div>'}
  </div>
  ${s.q && s.q.length && isExp ? `
    <div class="iq">
      ${s.q.map(q => `
        <div class="ql">
          <span class="qw">${esc(q.w)}\u00a0:</span>
          \u00ab\u00a0${esc(q.t)}\u00a0\u00bb
        </div>`).join('')}
    </div>` : ''}
</div>`;
}

function render() {
  const FKEYS = ['all','debate','watch','do','story','project'];
  const FLAB  = ['tous','discussion','à regarder','à faire','à raconter','projets'];
  const pend  = subj.filter(s => !s.done && (filt === 'all' || s.cat === filt));
  const done  = subj.filter(s =>  s.done && (filt === 'all' || s.cat === filt));
  const rem   = subj.filter(s => !s.done).length;
  const tot   = subj.length;

  document.getElementById('app').innerHTML = `
<div class="hd">
  <div class="hd-r">
    <div>
      <p class="ttl">nos sujets en attente</p>
      <p class="sub">la liste interminable, dans le bon sens</p>
    </div>
    <div class="cnt">
      <div class="cn">${rem}</div>
      <div class="ct">/ ${tot}</div>
    </div>
  </div>
</div>

<div class="flt">
  ${FKEYS.map((k,i) => `
    <button class="fb${filt===k?' fa':''}" onclick="setF('${k}')">${FLAB[i]}</button>
  `).join('')}
</div>

<div class="ab">
  <input id="ns" type="text" placeholder="Ajouter un sujet…" onkeydown="if(event.key==='Enter')addS()"/>
  <button class="abtn" onclick="addS()" aria-label="Ajouter">
    <i class="ti ti-plus"></i>
  </button>
</div>

<div>
  ${pend.map(s => ri(s)).join('')}
  ${pend.length === 0 && done.length > 0
    ? '<p class="emp">Tout est traité — bien joué.</p>'
    : ''}
  ${done.length > 0 ? `
    <div>
      <div class="ds-hd">
        <div class="dl"></div>
        <span class="dlb">
          <i class="ti ti-check" style="font-size:12px;vertical-align:-1px;margin-right:4px"></i>
          traités · ${done.length}
        </span>
        <div class="dl"></div>
      </div>
      ${done.map(s => ri(s)).join('')}
    </div>` : ''}
</div>

<div class="bottom"></div>`;
}

load();
</script>
</body>
